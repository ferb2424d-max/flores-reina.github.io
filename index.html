<body>

<div id="container">
    <div id="intro">Flores para ti 💜</div>
    <div id="flower"></div>

    <canvas id="treeCanvas"></canvas>

    <div id="leftText" class="textBox"></div>
    <div id="rightText" class="textBox"></div>
    <audio id="bgMusic" loop>
    <source src="https://dl.dropbox.com/scl/fi/8hhscx3bamdooxl5hnp11/Y-c-mo-no-te-voy-a-querer.mp3?rlkey=3xzsp5ij4gaibxy5qqbfp4auy&dl=1" type="audio/mpeg">
    </audio>

</div>

<script>
    
// 🌸 Flor inicial
const flower = document.getElementById("flower");
let transitionParticles = [];
let formingHeart = false;


for (let i = 0; i < 6; i++) {
    const p = document.createElement("div");
    p.className = "petal";
    p.style.transform = `rotate(${i * 60}deg)`;
    flower.appendChild(p);
}
const c = document.createElement("div");
c.className = "center";
flower.appendChild(c);

// Canvas
const canvas = document.getElementById("treeCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

// 🌸 Pétalos cayendo (configurable)
let petals = [];

// 🔥 CANTIDAD DE PÉTALOS
const PETAL_COUNT = 200;

// 🔥 VELOCIDAD (más natural)
const MIN_SPEED = 0.3;
const MAX_SPEED = 1.1;

// 🔥 MOVIMIENTO LATERAL
const SWAY = 0.04;

for (let i = 0; i < PETAL_COUNT; i++) {
    petals.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        size: Math.random() * 4 + 2,
        speed: Math.random() * (MAX_SPEED - MIN_SPEED) + MIN_SPEED,
        angle: Math.random()* Math.PI
    });
}

function drawPetals() {
    petals.forEach(p => {
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.angle);
        
        ctx.beginPath();
        ctx.ellipse(0, 0, p.size, p.size * 2, Math.PI / 4, 0, Math.PI * 2);
        ctx.fillStyle = "#e9a8ff";
        
        /*ctx.shadowBlur = 8;
        ctx.shadowColor = "#c084fc";*/
        ctx.fill();

        ctx.restore();
        p.angle += 0.01;

        
        // movimiento
        p.y += p.speed;
        p.x += Math.sin(p.y * SWAY);

        // reinicio
        if (p.y > canvas.height) {
            p.y = -10;
            p.x = Math.random() * canvas.width;
        }
    });
}

// Click
flower.onclick = () => {
    document.getElementById("intro").style.display = "none";
    flower.style.display = "none";
    canvas.style.display = "block";

    // 🎵 INICIAR MÚSICA
    const music = document.getElementById("bgMusic");
    music.volume = 0;

    music.play().then(() => {
        // fade suave 😏
        let vol = 0;
        let fade = setInterval(() => {
            if (vol < 0.4) {
                vol += 0.02;
                music.volume = vol;
            } else {
                clearInterval(fade);
            }
        }, 100);
    }).catch(err => {
        console.log("Error al reproducir audio:", err);
    });

    createTransition();
};

function createTransition() {

    const heartTargets = generateHeartPoints();

    const centerX = canvas.width / 2;
    const centerY = canvas.height / 2;

    transitionParticles = [];

    for (let i = 0; i < heartTargets.length; i++) {

        const target = heartTargets[i];

        transitionParticles.push({
            x: centerX,
            y: centerY,

            // explosión
            vx: (Math.random() - 0.5) * 10,
            vy: (Math.random() - 0.5) * 10,

            // destino corazón 💜
            tx: target.x,
            ty: target.y,

            size: Math.random() * 5 + 2
        });
    }

    animateTransition();
}

let phase = 0; // 0 = explosión, 1 = regreso

function animateTransition() {

    ctx.clearRect(0, 0, canvas.width, canvas.height);
    drawPetals();

    transitionParticles.forEach(p => {

        if (phase === 0) {
            // 💥 EXPLOSIÓN
            p.x += p.vx;
            p.y += p.vy;

            p.vx *= 0.97;
            p.vy *= 0.97;

            // cuando se frenan → cambiar fase
            if (Math.abs(p.vx) < 0.5) {
                phase = 1;
            }

        } else {
            // 💫 MAGNETISMO HACIA EL CORAZÓN
            p.x += (p.tx - p.x) * 0.05;
            p.y += (p.ty - p.y) * 0.05;
        }

        // dibujar partícula
        ctx.beginPath();
        ctx.ellipse(p.x, p.y, p.size, p.size * 2, Math.PI / 4, 0, Math.PI * 2);
        ctx.fillStyle = "#d8b4fe";
        ctx.fill();
    });

    // cuando ya están casi en su lugar
    if (phase === 1) {
        let done = transitionParticles.every(p =>
            Math.abs(p.x - p.tx) < 1 &&
            Math.abs(p.y - p.ty) < 1
        );

        if (done) {
            startHeartSequence();
            return;
        }
    }

    requestAnimationFrame(animateTransition);
}

function startHeartSequence() {
    transitionParticles = [];

    //createHeart();
    points = generateHeartPoints();
    i = 0;
    animate();

    // 💥 IMPORTANTE: ahora sí mostramos texto y reloj
    setTimeout(showText, 1500);
}

// 💜 Crear corazón grande con lirios
let points = [];
let i = 0;
function generateHeartPoints() {
    let heartPoints = [];

    for (let x = -16; x <= 16; x += 0.2) {
        for (let y = -16; y <= 16; y += 0.2) {

            let eq = Math.pow(x*x + y*y - 1, 3) - x*x*y*y*y;

            if (eq <= 0) {
                heartPoints.push({
                    x: canvas.width/2 + x * 120,
                    y: canvas.height/2 - y * 120
                });
            }
        }
    }

    return heartPoints;
}
// 🌸 Lirio
function drawFlower(x, y) {

    const petalLength = 14;
    const petalWidth = 4;
     ctx.shadowBlur = 1;

    for (let i = 0; i < 6; i++) {
        ctx.save();

        ctx.translate(x, y);
        ctx.rotate(i * Math.PI / 3);

        ctx.beginPath();
        ctx.ellipse(0, -petalLength / 2, petalWidth, petalLength, 0, 0, Math.PI * 2);

        ctx.fillStyle = "#d8b4fe";
        ctx.fill();

        // contorno
        ctx.lineWidth = 0.8;
        ctx.strokeStyle = "#6b21a8";
        ctx.stroke();

        ctx.restore();
    }

    // centro
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = "#fde047";
    ctx.fill();
}

// 💓 Animación con latido
let scale = 1;

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    drawPetals();

    scale = 1 + Math.sin(Date.now() * 0.003) * 0.05;

    for (let j = 0; j < Math.min(i, points.length); j++) {

    const p = points[j];
    if (!p) continue;

    drawFlower(
        canvas.width / 2 + (p.x - canvas.width/2) * scale,
        canvas.height / 2 + (p.y - canvas.height/2) * scale
    );
    }
    if (i < points.length) i += 4;

    requestAnimationFrame(animate);
}

// ✍️ Texto
function showText() {
    const left = `Mi reina, ama de mi universo
y luz que guía mis noches más oscuras...

Desde aquel primer momento,
mi corazón supo que eras especial.`;

    const right = `Gracias por cada momento,
por ser mi paz y mi lugar seguro...

Y si el mundo estuviera en tu contra,
yo estaría en contra del mundo 💜`;

    typeText(document.getElementById("leftText"), left);
    setTimeout(() => {
        typeText(document.getElementById("rightText"), right);
    }, 1200);

    document.getElementById("leftText").style.display = "block";
    document.getElementById("rightText").style.display = "block";

    startTimer();
}

function typeText(el, text) {
    let i = 0;
    function t() {
        if (i < text.length) {
            el.innerHTML += text[i] === "\n" ? "<br>" : text[i];
            i++;
            setTimeout(t, 20);
        }
    }
    t();
}

// ⏱️ Timer
function startTimer() {
    const timer = document.getElementById("timer");
    timer.style.display = "block";

    const startDate = new Date("2025-04-01T23:25:00");

    function update() {
        const now = new Date();
        const diff = now - startDate;

        let d = Math.floor(diff / (1000*60*60*24));
        let h = Math.floor(diff / (1000*60*60)) % 24;
        let m = Math.floor(diff / (1000*60)) % 60;
        let s = Math.floor(diff / 1000) % 60;

        timer.innerText = `${d} días ${h} horas ${m} min ${s} seg`;
    }

    setInterval(update, 1000);
}
</script>
